name: "Build e Deploy para stable-website"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout do Repositorio"
        uses: actions/checkout@v4

      - name: "Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 22.1.0
          cache: 'npm'

      - name: "Instalar Dependencias (com devDependencies para build)"
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: "Rodar Build do Frontend"
        run: npm run build

      - name: "Preparar pasta de deploy (projeto COMPLETO)"
        run: |
          mkdir -p deploy
          # Copia TUDO do projeto, exceto pastas que nao devem ir para deploy.
          # Usamos rsync com excludes para garantir que nenhum arquivo seja perdido.
          rsync -a \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='deploy' \
            --exclude='.github/workflows/.cache' \
            --exclude='*.tsbuildinfo' \
            ./ deploy/

          # Garante que o build compilado esta presente
          if [ ! -d deploy/dist ]; then
            echo "ERRO: pasta dist/ nao foi gerada pelo build"
            exit 1
          fi

          # Verifica se a build gerou as rotas admin no bundle.
          # Nomes de componentes sao minificados pelo Vite, entao procuramos
          # pelas strings das rotas que sao preservadas como literais.
          echo "=== Verificando rotas admin no bundle ==="
          if grep -rE "/admin/login|\"/admin\"" deploy/dist/assets/ >/dev/null 2>&1; then
            echo "OK: rotas admin presentes no bundle compilado"
          else
            echo "AVISO: rotas admin nao encontradas via grep (build minificada)."
            echo "Verificando se os arquivos fonte das paginas admin existem..."
            if [ -f deploy/src/pages/AdminLogin.tsx ] && [ -f deploy/src/pages/AdminDashboard.tsx ]; then
              echo "OK: arquivos fonte das paginas admin presentes em deploy/"
            else
              echo "ERRO: arquivos fonte das paginas admin ausentes em deploy/"
              exit 1
            fi
          fi

          # Verifica se arquivos criticos do servidor existem
          for f in server.js server/api.js server/auth.js server/db.js package.json package-lock.json supabase-migration.sql; do
            if [ ! -f deploy/$f ]; then
              echo "ERRO: arquivo critico ausente em deploy/: $f"
              exit 1
            fi
          done

          # Lista o que sera publicado (debug)
          echo "=== Conteudo final de deploy/ ==="
          ls -la deploy/
          echo "=== src/pages/admin presente? ==="
          ls -la deploy/src/pages/admin/ || echo "AVISO: src/pages/admin ausente"

      - name: "Deploy para a Branch stable-website"
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: stable-website
          folder: deploy
          clean: true
