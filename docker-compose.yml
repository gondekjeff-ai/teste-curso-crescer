version: '3.8'

services:
  web:
    build: .
    ports:
      - "21002:21002"
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - DB_SSL=true
      - JWT_SECRET=${JWT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}

volumes:
  uploads_data:
